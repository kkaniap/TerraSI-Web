<div class="terra-details-container">
  <div class="terra-details-top">

    <div class="terra-details-top-left">
      <div class="terra-details-top-left-container">
        <img src="assets/terrariumsAssets/robot.png" class="robot-img" alt="turn_ON_SI">
        <mat-slide-toggle></mat-slide-toggle>
        <span>OFF / ON</span>
      </div>
    </div>

    <div class="terra-details-top-middle">
      <img src="assets/terrariumsAssets/terrarium.png" class="terra-img" alt="terrarium_img">
    </div>

    <div class="terra-details-top-right">

      <div class="terra-details-top-right-slider-container">
          <img src="assets/terrariumsAssets/bulb.png" alt="bulb_icon" style="height: 2.8vw; width: 2.1vw;">
          <mat-slider vertical thumbLabel ></mat-slider>
      </div>

      <div class="terra-details-top-right-slider-container">
        <img src="assets/terrariumsAssets/tear.png" alt="tear_icon" style="height: 2.8vw; width: 2.1vw;">
        <mat-slider vertical thumbLabel ></mat-slider>
      </div>

      <div class="terra-details-top-right-slider-container">
        <img src="assets/terrariumsAssets/sunrise.png" alt="sunrise_icon" style="height: 2.8vw; width: 3vw;">
        <mat-slider vertical thumbLabel ></mat-slider>
      </div>

      <div class="terra-details-top-right-slider-container">
        <img src="assets/terrariumsAssets/sunset.png" alt="sunset_icon" style="height: 2.8vw; width: 3vw;">
        <mat-slider vertical thumbLabel ></mat-slider>
      </div>

      <div class="terra-details-top-right-slider-container">
        <img src="assets/terrariumsAssets/sun-speed.png" alt="suns_speed_icon" style="height: 2.8vw; width: 3vw;">
        <mat-slider vertical thumbLabel ></mat-slider>
      </div>

    </div>

  </div>
</div>
